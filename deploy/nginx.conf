# ============================================================
# llm-wiki-kit nginx 配置（Windows 版）
# 用于将 wiki-app-hub 和 api-gateway 两个服务对外暴露
#
# 使用方式：
#   将此文件内容覆盖到 nginx/conf/nginx.conf
#   修改 server_name 为实际域名或 IP
#   执行 nginx -t 验证配置，然后 nginx -s reload 热重载
# ============================================================

worker_processes  1;

error_log  logs/error.log warn;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  logs/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Ingest 最大上传文件大小（略大于 MAX_INGEST_FILE_MB）
    client_max_body_size 60M;

    # ──────────────────────────────────────────────────────────
    # Wiki 知识库管理界面（内部使用，端口 8080）
    # 访问地址：http://服务器IP:8080
    # ──────────────────────────────────────────────────────────
    server {
        listen       8080;
        server_name  _;   # 改为服务器内网 IP 或域名，如 wiki.company.com

        # 所有请求转发到 wiki-app-hub
        location / {
            proxy_pass         http://127.0.0.1:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # LLM Ingest 流式输出（SSE）支持
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
            proxy_buffering       off;
            proxy_cache           off;
            proxy_http_version    1.1;
            proxy_set_header      Connection '';
        }
    }

    # ──────────────────────────────────────────────────────────
    # Wiki API Gateway（对外接口，供 AI 应用和文件库系统调用）
    # 访问地址：http://服务器IP:8081
    # ──────────────────────────────────────────────────────────
    server {
        listen       8081;
        server_name  _;   # 改为对外域名，如 wiki-api.company.com

        # 所有 API 请求转发到 api-gateway
        location / {
            proxy_pass         http://127.0.0.1:8745;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # LLM 查询可能耗时较长
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
            proxy_buffering       off;
            proxy_cache           off;
        }

        # API 文档（开放访问）
        location /docs {
            proxy_pass http://127.0.0.1:8745/docs;
        }

        location /health {
            proxy_pass http://127.0.0.1:8745/health;
        }
    }
}
