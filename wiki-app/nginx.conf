# 放到服务器 /etc/nginx/sites-available/wiki-app
# 然后：ln -s /etc/nginx/sites-available/wiki-app /etc/nginx/sites-enabled/
# 修改 your-domain.com 为实际域名

server {
    listen 80;
    server_name your-domain.com;

    # 如果有 SSL 证书，改用下面的配置并删除这段
    # listen 443 ssl;
    # ssl_certificate     /etc/ssl/certs/your-domain.crt;
    # ssl_certificate_key /etc/ssl/private/your-domain.key;

    # SSE 流式端点（Ingest 进度推送）— 必须关闭缓冲
    location /api/admin/ingest/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;    # LLM 响应可能较慢
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }
}
